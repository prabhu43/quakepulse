<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuakePulse — Real-Time Earthquake Monitor</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Top Bar -->
    <header id="topbar">
        <div class="topbar-left">
            <h1>🌍 QuakePulse</h1>
            <span class="tagline">Real-Time Earthquake Monitor</span>
        </div>
        <div class="topbar-center">
            <div class="filters">
                <label>
                    Time:
                    <select id="filter-hours">
                        <option value="1">Past Hour</option>
                        <option value="24" selected>Past 24h</option>
                        <option value="168">Past 7 Days</option>
                        <option value="720">Past 30 Days</option>
                    </select>
                </label>
                <label>
                    Min Mag:
                    <input type="range" id="filter-min-mag" min="0" max="9" step="0.5" value="0" />
                    <span id="min-mag-value">0</span>
                </label>
            </div>
        </div>
        <div class="topbar-right">
            <div id="live-indicator">
                <span class="dot"></span>
                <span class="label">Connecting...</span>
            </div>
            <button id="toggle-theme" title="Toggle day/night mode">☀️</button>
            <button id="toggle-panel" title="Toggle side panel">☰</button>
        </div>
    </header>

    <!-- Main Content -->
    <div id="main">
        <!-- Map -->
        <div id="map"></div>

        <!-- Side Panel -->
        <aside id="panel" class="open">
            <!-- Tabs -->
            <div class="panel-tabs">
                <button class="tab active" data-tab="list">Earthquakes</button>
                <button class="tab" data-tab="stats">Analytics</button>
            </div>

            <!-- Earthquake List Tab -->
            <div class="tab-content active" id="tab-list">
                <div class="list-header">
                    <span id="quake-count">0 earthquakes</span>
                </div>
                <ul id="quake-list"></ul>
            </div>

            <!-- Analytics Tab -->
            <div class="tab-content" id="tab-stats">
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-total">—</div>
                        <div class="stat-label">Last 7 Days</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-24h">—</div>
                        <div class="stat-label">Last 24h</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-avg-mag">—</div>
                        <div class="stat-label">Avg Magnitude</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-max-mag">—</div>
                        <div class="stat-label">Max Magnitude</div>
                    </div>
                </div>
                <div class="chart-container">
                    <h3>Magnitude Distribution</h3>
                    <canvas id="chart-magnitude"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Earthquakes per Hour (24h)</h3>
                    <canvas id="chart-timeline"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Most Active Regions</h3>
                    <ul id="top-regions"></ul>
                </div>
            </div>
        </aside>
    </div>

    <!-- Legend -->
    <div id="legend">
        <span class="legend-title">Magnitude</span>
        <span class="legend-item"><span class="dot-legend" style="background:#22c55e"></span>&lt;2</span>
        <span class="legend-item"><span class="dot-legend" style="background:#eab308"></span>2-4</span>
        <span class="legend-item"><span class="dot-legend" style="background:#f97316"></span>4-5</span>
        <span class="legend-item"><span class="dot-legend" style="background:#ef4444"></span>5-6</span>
        <span class="legend-item"><span class="dot-legend" style="background:#991b1b"></span>6+</span>
    </div>

    <script src="js/map.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
